<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
    <title>経費ぽん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>経費ぽん</h1>
            <p class="subtitle">写真をJPEGに変換してぽんと保存</p>
        </div>

        <form id="receiptForm" class="form">
            <div class="form-group">
                <label for="date">日付</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="amount">金額</label>
                <input type="number" id="amount" name="amount" placeholder="例: 1500" required>
            </div>

            <div class="form-group">
                <label for="name">氏名</label>
                <input type="text" id="name" name="name" placeholder="例: 山田太郎" required>
                <label class="toggle-row">
                    <span class="toggle-switch">
                        <input type="checkbox" id="saveName">
                        <span class="toggle-slider"></span>
                    </span>
                    <span class="toggle-label">名前を保存する</span>
                    <span class="tooltip-wrap">
                        <span class="tooltip-icon">ⓘ</span>
                        <span class="tooltip-text">オンにすると次回起動時も氏名が入力された状態になります</span>
                    </span>
                </label>
            </div>

            <div class="form-group">
                <label for="imageInput">画像を選択</label>
                <label class="file-label" id="dropZone" for="imageInput">
                    <span class="file-icon">📎</span>
                    <span id="fileLabel">クリックまたはドラッグ＆ドロップ</span>
                </label>
                <input type="file" id="imageInput" name="image" required>
                <p class="hint">JPEG・PNG・HEIC・WebP・BMP・TIFF など、あらゆる画像形式に対応しています。</p>
                <div class="file-info" id="fileInfo"></div>
            </div>

            <div class="preview-container" id="previewContainer" style="display: none;">
                <div class="preview-header">
                    <p class="preview-label">プレビュー</p>
                    <button type="button" class="btn-reset" id="resetBtn">✕ リセット</button>
                </div>
                <img id="previewImage" alt="プレビュー">
            </div>

            <button type="button" class="btn-primary" id="processBtn">
                ぽんと保存する ✨
            </button>
        </form>

        <div class="info-box">
            <span class="info-icon">📁</span>
            <code id="fileNamePreview">yyyy_mm_dd_金額_氏名.jpg</code>
        </div>
    </div>

    <script src="lib/heic2any.min.js" onerror="console.warn('heic2any未読込')"></script>
    <script src="script.js"></script>
</body>
</html>
